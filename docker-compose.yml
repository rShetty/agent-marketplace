version: '3.8'

services:
  marketplace:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/agent_marketplace.db
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-your-encryption-key-change-in-production}
      - AGENT_IMAGE=hermes-agent:latest
      - MARKETPLACE_URL=http://localhost:8000
    volumes:
      - ./data:/data
      # WARNING: Docker socket grants host-level access. Use a socket proxy in production.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - agent-marketplace
    restart: unless-stopped

  # Optional: Traefik reverse proxy
  traefik:
    image: traefik:v3.0
    command:
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - agent-marketplace
    profiles:
      - with-proxy

networks:
  agent-marketplace:
    driver: bridge
