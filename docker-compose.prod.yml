services:
  marketplace:
    build: .
    ports:
      - "127.0.0.1:8081:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/agent_marketplace.db
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-changeme-in-production}
      - AGENT_IMAGE=agent-marketplace-agent:latest
      - MARKETPLACE_URL=${MARKETPLACE_URL:-https://hive.rajeev.me}
      - SECRET_KEY=${SECRET_KEY:-changeme-in-production}
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - agent-marketplace

networks:
  agent-marketplace:
    driver: bridge
