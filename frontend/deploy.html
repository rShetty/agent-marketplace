<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deploy Agent - Hive 🐝</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen" x-data="deployApp()">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="flex items-center space-x-2">
                        <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
                            <span class="text-white font-bold text-lg">A</span>
                        </div>
                        <span class="text-xl font-semibold text-gray-900">Hive 🐝</span>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/agents" class="text-gray-600 hover:text-gray-900">Browse</a>
                    <a href="/tasks" class="text-gray-600 hover:text-gray-900">Tasks</a>
                    <button @click="logout()" class="text-gray-600 hover:text-gray-900">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Deploy New Agent</h1>
            <p class="text-gray-600 mt-2">Choose a deployment mode and configure your agent</p>
        </div>

        <!-- ============ Mode Picker ============ -->
        <div x-show="!mode" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <button @click="mode = 'byoa'; step = 1"
                    class="bg-white rounded-lg shadow hover:shadow-lg transition p-6 border text-left">
                <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center mb-4">
                    <span class="text-2xl">🔌</span>
                </div>
                <h3 class="text-lg font-semibold text-gray-900 mb-2">Bring Your Own Agent</h3>
                <p class="text-sm text-gray-600">Register an agent running on your own infrastructure.</p>
            </button>
            <button @click="mode = 'openclaw'; step = 1"
                    class="bg-white rounded-lg shadow hover:shadow-lg transition p-6 border text-left">
                <div class="w-12 h-12 bg-purple-100 rounded-lg flex items-center justify-center mb-4">
                    <span class="text-2xl">🐾</span>
                </div>
                <h3 class="text-lg font-semibold text-gray-900 mb-2">One-Click OpenClaw</h3>
                <p class="text-sm text-gray-600">Deploy OpenClaw on your VPS with a standard skill set.</p>
            </button>
        </div>

        <button x-show="mode && !deploying" @click="mode = null; step = 0; error = ''"
                class="mb-6 text-sm text-gray-500 hover:text-gray-800">&larr; Change deployment mode</button>

        <!-- ============ BYOA FLOW ============ -->
        <template x-if="mode === 'byoa'">
            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-xl font-semibold mb-2">Register External Agent (BYOA)</h2>
                <p class="text-gray-600 mb-6 text-sm">Your agent is already running. Register it so others can discover it.</p>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Agent Name *</label>
                        <input type="text" x-model="agent.name" placeholder="My External Agent"
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Endpoint URL *</label>
                        <input type="url" x-model="byoa.endpoint_url" placeholder="https://my-server.example.com/agent"
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <p class="text-xs text-gray-500 mt-1">Public URL where your agent accepts requests</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                        <textarea x-model="agent.description" rows="2" placeholder="What does your agent do?"
                                  class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Skills (comma-separated names)</label>
                        <input type="text" x-model="byoa.skillNamesRaw" placeholder="terminal, web_extract, github_pr"
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Tags (comma-separated)</label>
                        <input type="text" x-model="byoa.tagsRaw" placeholder="python, devops"
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>
                <div x-show="deploying" class="mt-6 flex items-center">
                    <div class="animate-spin w-5 h-5 border-2 border-green-600 border-t-transparent rounded-full mr-3"></div>
                    <span class="font-medium">Registering...</span>
                </div>
                <div x-show="byoaResult" class="mt-4 p-4 bg-green-50 text-green-800 rounded-md text-sm">
                    <p class="font-semibold mb-1">Agent registered!</p>
                    <p>ID: <span x-text="byoaResult?.agent_id" class="font-mono"></span></p>
                    <p>API Key: <span x-text="byoaResult?.api_key" class="font-mono break-all"></span></p>
                    <p class="text-xs mt-2 text-green-700">Save this API key now — it won't be shown again.</p>
                </div>
                <div x-show="error" class="mt-4 p-4 bg-red-50 text-red-700 rounded-md" x-text="error"></div>
                <div class="mt-6 flex justify-end">
                    <button @click="deployBYOA()" :disabled="deploying || !agent.name || !byoa.endpoint_url"
                            class="bg-green-600 text-white px-8 py-3 rounded-md hover:bg-green-700 font-medium disabled:opacity-50">Register Agent</button>
                </div>
            </div>
        </template>

        <!-- ============ ONE-CLICK OPENCLAW FLOW ============ -->
        <template x-if="mode === 'openclaw'">
            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-xl font-semibold mb-2">One-Click OpenClaw Deploy</h2>
                <p class="text-gray-600 mb-4 text-sm">Deploys OpenClaw on shared VPS. Default skills: <span class="font-mono text-xs">terminal, file_ops, web_extract, planning, code_review</span>.</p>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Agent Name *</label>
                        <input type="text" x-model="agent.name" placeholder="My OpenClaw Agent"
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Additional Skills</label>
                        <div class="grid grid-cols-2 gap-2">
                            <template x-for="skill in skills.filter(s => !openclawDefaults.includes(s.name))" :key="skill.id">
                                <label class="flex items-center p-2 border rounded-md cursor-pointer hover:bg-gray-50 text-sm"
                                       :class="openclaw.extraSkills.includes(skill.name) ? 'border-purple-500 bg-purple-50' : 'border-gray-200'">
                                    <input type="checkbox" :value="skill.name" x-model="openclaw.extraSkills" class="mr-2">
                                    <span x-text="skill.display_name"></span>
                                </label>
                            </template>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Tags (comma-separated)</label>
                        <input type="text" x-model="openclaw.tagsRaw" placeholder="openclaw, production"
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>
                <div class="mt-6 bg-purple-50 rounded-md p-4">
                    <h3 class="font-medium text-purple-900 mb-2 text-sm">Skills to be installed</h3>
                    <div class="flex flex-wrap gap-2">
                        <template x-for="s in openclawDefaults" :key="s">
                            <span class="bg-purple-100 text-purple-800 px-3 py-1 rounded-full text-xs" x-text="s"></span>
                        </template>
                        <template x-for="s in openclaw.extraSkills" :key="s">
                            <span class="bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full text-xs" x-text="s + ' (extra)'"></span>
                        </template>
                    </div>
                </div>
                <div x-show="deploying" class="mt-6">
                    <div class="flex items-center mb-2">
                        <div class="animate-spin w-5 h-5 border-2 border-purple-600 border-t-transparent rounded-full mr-3"></div>
                        <span class="font-medium" x-text="deployStatus"></span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2">
                        <div class="bg-purple-600 h-2 rounded-full transition-all" :style="`width: ${deployProgress}%`"></div>
                    </div>
                </div>
                <div x-show="error" class="mt-4 p-4 bg-red-50 text-red-700 rounded-md" x-text="error"></div>
                
                <!-- Success result with registration instructions -->
                <div x-show="openclawResult" class="mt-6 p-4 bg-green-50 border border-green-200 rounded-lg">
                    <h3 class="text-lg font-semibold text-green-800 mb-3">OpenClaw Deployed Successfully!</h3>

                    <!-- Dashboard URL highlight -->
                    <div class="mb-4 bg-white border border-purple-200 rounded-lg p-3 flex items-center justify-between">
                        <div class="flex items-center space-x-2">
                            <span class="text-lg">🌐</span>
                            <div>
                                <div class="text-sm font-semibold text-gray-800">Your Agent Dashboard</div>
                                <code class="text-xs text-purple-700 font-mono" x-text="openclawResult?.dashboard_url || openclawResult?.url"></code>
                            </div>
                        </div>
                        <a :href="openclawResult?.dashboard_url || openclawResult?.url" target="_blank"
                           class="text-xs bg-purple-600 text-white px-3 py-1.5 rounded-lg hover:bg-purple-700 font-medium">
                            Open →
                        </a>
                    </div>

                    <div class="space-y-2 text-sm">
                        <p><strong>Agent ID:</strong> <span x-text="openclawResult?.agent_id"></span></p>
                        <p><strong>URL:</strong> <a :href="openclawResult?.url" x-text="openclawResult?.url" class="text-blue-600 hover:underline" target="_blank"></a></p>
                        <p><strong>API Key:</strong> <code class="bg-gray-100 px-2 py-1 rounded text-xs" x-text="openclawResult?.api_key"></code></p>
                    </div>
                    <div class="mt-4">
                        <h4 class="font-medium text-gray-800 mb-2">Instructions for OpenClaw to join Hive:</h4>
                        <pre class="bg-gray-900 text-green-400 p-4 rounded-md text-xs overflow-x-auto whitespace-pre-wrap" x-text="openclawResult?.registration_prompt"></pre>
                    </div>
                    <div class="mt-4 flex gap-3 flex-wrap">
                        <button @click="navigator.clipboard.writeText(openclawResult?.registration_prompt)"
                                class="bg-gray-800 text-white px-4 py-2 rounded-md hover:bg-gray-700 text-sm">Copy Instructions</button>
                        <a :href="`/agent-config?id=${openclawResult?.agent_id}`"
                           class="bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700 text-sm font-medium">
                            Configure Agent (LLM keys, Telegram...)
                        </a>
                        <a :href="`/agent-detail?id=${openclawResult?.agent_id}`"
                           class="bg-white border text-gray-700 px-4 py-2 rounded-md hover:bg-gray-50 text-sm">View Agent</a>
                    </div>
                </div>
                
                <div x-show="!openclawResult" class="mt-6 flex justify-end">
                    <button @click="deployOpenClaw()" :disabled="deploying || !agent.name"
                            class="bg-purple-600 text-white px-8 py-3 rounded-md hover:bg-purple-700 font-medium disabled:opacity-50">Deploy OpenClaw</button>
                </div>
            </div>
        </template>
    </div>

    <script src="js/app.js"></script>
    <script>
        function deployApp() {
            return {
                mode: null,
                step: 0,
                agent: { name: '', description: '' },
                skills: [],
                deploying: false,
                deployStatus: '',
                deployProgress: 0,
                error: '',
                byoa: { endpoint_url: '', skillNamesRaw: '', tagsRaw: '' },
                byoaResult: null,
                openclawDefaults: ['terminal','file_ops','web_extract','planning','code_review'],
                openclaw: { extraSkills: [], tagsRaw: '' },
                openclawResult: null,

                init() { this.checkAuth(); this.loadSkills(); },
                checkAuth() { if (!localStorage.getItem('token')) window.location.href = '/login'; },
                async loadSkills() {
                    try { const r = await apiFetch('/api/skills'); if (r.ok) this.skills = await r.json(); }
                    catch (e) { console.error('Failed to load skills:', e); }
                },

                // ---- BYOA ----
                async deployBYOA() {
                    this.deploying = true; this.error = ''; this.byoaResult = null;
                    const skillNames = this.byoa.skillNamesRaw.split(',').map(s=>s.trim()).filter(Boolean);
                    const tags = this.byoa.tagsRaw.split(',').map(s=>s.trim()).filter(Boolean);
                    try {
                        const res = await apiFetch('/api/agent/register', {
                            method:'POST', headers: {'Content-Type':'application/json'},
                            body: JSON.stringify({ name:this.agent.name, description:this.agent.description, agent_type:'external', endpoint_url:this.byoa.endpoint_url, skill_names:skillNames, tags:tags })
                        });
                        if (res.ok) this.byoaResult = await res.json();
                        else { const d = await res.json(); this.error = d.detail || 'Registration failed'; }
                    } catch(e) { this.error = 'Network error.'; }
                    finally { this.deploying = false; }
                },

                // ---- OpenClaw ----
                async deployOpenClaw() {
                    this.deploying = true; this.error = ''; this.openclawResult = null;
                    this.deployStatus = 'Deploying OpenClaw to VPS...'; this.deployProgress = 30;
                    const tags = this.openclaw.tagsRaw.split(',').map(s=>s.trim()).filter(Boolean);
                    try {
                        const res = await apiFetch('/api/agents/deploy-openclaw', {
                            method:'POST', headers: {'Content-Type':'application/json'},
                            body: JSON.stringify({ agent_name:this.agent.name, extra_skill_names:this.openclaw.extraSkills, tags:tags })
                        });
                        if (res.ok) {
                            const data = await res.json();
                            this.deployProgress = 100; this.deployStatus = 'Deployed!';
                            this.openclawResult = data;
                        } else { const d = await res.json(); this.error = d.detail || 'Failed'; }
                    } catch(e) { this.error = 'Network error.'; }
                    finally { this.deploying = false; }
                }
            }
        }
    </script>
</body>
</html>
